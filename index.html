<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="مساعد محاسبي ذكي لشركات الشحن والتخليص الجمركي" />
    <meta name="theme-color" content="#EFF5FB" />
    <title>AI Accounting Assistant</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Polyfill for process.env -->
    <script>
      window.process = {
        env: {
          API_KEY: "" 
        }
      };
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class', 
        theme: {
          extend: {
            fontFamily: {
              sans: ['Cairo', 'sans-serif'],
            },
            colors: {
              'primary': '#EFF5FB',
              'primary-dark': '#D6E1EF',
              'accent': '#3A86FF',
              'accent-dark': '#0054D1',
              'text-primary': '#0F172A',
              'text-secondary': '#64748B',
              'debit': '#DC2626',
              'credit': '#16A34A',
            },
            boxShadow: {
              'neumo': '8px 8px 16px #D6E1EF, -8px -8px 16px #FFFFFF',
              'neumo-sm': '4px 4px 8px #D6E1EF, -4px -4px 8px #FFFFFF',
              'neumo-inset': 'inset 8px 8px 16px #D6E1EF, inset -8px -8px 16px #FFFFFF',
            }
          },
        },
      }
    </script>

    <style>
      :root {
        --color-primary: #EFF5FB;
        --color-primary-light: #FFFFFF;
        --color-primary-dark: #D6E1EF;
        --color-accent: #3A86FF;
        --color-text-primary: #0F172A;
        --color-text-secondary: #64748B;
        --color-debit: #DC2626;
        --color-credit: #16A34A;
      }

      html.dark {
        --color-primary: #1E293B;
        --color-primary-light: #334155;
        --color-primary-dark: #0F172A;
        --shadow-neumo: 8px 8px 16px #0F172A, -8px -8px 16px #334155;
      }

      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body { background-color: var(--color-primary); color: var(--color-text-primary); font-family: 'Cairo', sans-serif; overflow: hidden; }
      
      @media print {
        .no-print { display: none !important; }
        body { background: white !important; overflow: visible !important; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "uuid": "https://esm.sh/uuid@^13.0.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
